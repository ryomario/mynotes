name: 🚀 Feature Request
description: Propose a new feature or enhancement for My Notes.
title: "feat: [short description of the feature]"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make My Notes even better? Please describe your suggestion below.
  - type: textarea
    id: problem
    attributes:
      label: ❓ Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I find it difficult to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 Describe the Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Add a search bar to the bookmark sidebar that filters bookmarks by title or tag.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Describe Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: I tried sorting bookmarks alphabetically, but...
  - type: textarea
    id: additional-context
    attributes:
      label: ✨ Additional Context
      description: Add any other context, mockup drawings, screenshots, or details about the feature request here.
