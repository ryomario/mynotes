<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Notes</title>
</head>

<body>
  <div id="app" class="app-container">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h2>My Notes</h2>
        <button id="add-note-btn" class="btn-add" title="New Note">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
        </button>
      </header>
      <nav id="notes-list" class="notes-list"></nav>
      <footer class="sidebar-footer">
        <button id="settings-btn" class="btn-settings" title="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.49,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.51,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.68 9.13,18.93L9.51,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.49,21.58L14.87,18.93C15.47,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
          </svg>
          Settings
        </button>
      </footer>
    </aside>
    <main class="editor-container">
      <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" />
        </svg>
      </button>
      <textarea id="note-editor" placeholder="Start writing..." spellcheck="false"></textarea>
    </main>
    <aside id="settings-sidebar" class="settings-sidebar">
      <header class="settings-header">
        <h3>Settings</h3>
        <button id="settings-close" class="btn-close">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </header>
      <div class="settings-content">
        <section class="settings-section">
          <h4>Appearance</h4>
          <div class="setting-item">
            <span>Dark Mode</span>
            <label class="switch">
              <input type="checkbox" id="dark-mode-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <span>Remember last note</span>
            <label class="switch">
              <input type="checkbox" id="remember-note-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
        </section>
        <section class="settings-section">
          <h4>Editor</h4>
          <div class="setting-item">
            <span>Font Size</span>
            <input type="range" id="font-size-range" min="14" max="24" value="18">
            <span id="font-size-value">18px</span>
          </div>
          <div class="setting-item">
            <span>Font Family</span>
            <select id="font-family-select">
              <option value="Sans">Sans Serif</option>
              <option value="Serif">Serif</option>
              <option value="Mono">Monospace</option>
            </select>
          </div>
          <div class="setting-item">
            <span>Text Color</span>
            <div class="color-palette">
              <button class="color-btn active" data-color="#f8fafc" style="background: #f8fafc;"></button>
              <button class="color-btn" data-color="#cbd5e1" style="background: #cbd5e1;"></button>
              <button class="color-btn" data-color="#94a3b8" style="background: #94a3b8;"></button>
              <button class="color-btn" data-color="#38bdf8" style="background: #38bdf8;"></button>
              <button class="color-btn" data-color="#fbbf24" style="background: #fbbf24;"></button>
            </div>
          </div>
        </section>
        <section class="settings-section">
          <h4>Data</h4>
          <div class="setting-item">
            <button id="export-btn" class="btn-action">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" />
              </svg>
              Export JSON
            </button>
            <button id="import-btn" class="btn-action">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M5,20H19V18H5M5,10H9V16H15V10H19L12,3L5,10Z" />
              </svg>
              Import JSON
            </button>
            <input type="file" id="import-input" accept=".json" style="display: none;">
          </div>
        </section>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
