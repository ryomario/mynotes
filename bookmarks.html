<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="bookmarks_page_title">My Notes - Bookmarks</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="bookmarks-app" class="app-container bookmarks-app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h2 data-i18n="bookmarks_header">Bookmarks</h2>
        <button id="add-folder-btn" class="btn-add" title="Add Folder" data-i18n-title="add_folder_tooltip">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
        </button>
      </header>
      <nav id="bookmark-folders" class="notes-list bookmark-folders"></nav>
      <footer class="sidebar-footer">
        <a href="/index.html" class="btn-settings" title="Back to Notes" data-i18n-title="notes_nav">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M14,7L9,12L14,17V7Z" />
          </svg>
          <span data-i18n="notes_nav">Notes</span>
        </a>
        <button id="bookmarks-settings-btn" class="btn-settings" title="Settings" data-i18n-title="bookmarks_settings_title">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.49,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.51,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.68 9.13,18.93L9.51,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.49,21.58L14.87,18.93C15.47,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
          </svg>
          <span data-i18n="settings_title">Settings</span>
        </button>
      </footer>
    </aside>

    <main class="editor-container bookmarks-main">
      <div class="bookmarks-toolbar">
        <input id="bookmark-search" type="search" placeholder="Search bookmarks..." data-i18n-placeholder="search_placeholder" class="bookmark-search" />
      </div>
      <section id="bookmarks-grid" class="bookmarks-grid"></section>
    </main>
  </div>

  <input id="thumbnail-input" type="file" accept="image/*" style="display:none" />

  <div id="bookmark-modal-backdrop" class="bookmark-modal-backdrop" hidden>
    <div class="bookmark-modal" role="dialog" aria-modal="true" aria-labelledby="bookmark-modal-title">
      <header class="bookmark-modal-header">
        <h3 id="bookmark-modal-title" data-i18n="add_bookmark_title">Tambah Bookmark</h3>
        <button id="bookmark-modal-close" class="btn-close" type="button" aria-label="Close modal">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </header>
      <form id="bookmark-form" class="bookmark-form">
        <label class="bookmark-form-field">
          <span data-i18n="title_label">Judul</span>
          <input id="bookmark-title-input" type="text" required placeholder="Contoh: Vite Docs" data-i18n-placeholder="title_placeholder" />
        </label>
        <label class="bookmark-form-field">
          <span data-i18n="url_label">URL</span>
          <input id="bookmark-url-input" type="url" required placeholder="https://example.com" data-i18n-placeholder="url_placeholder" />
        </label>
        <label class="bookmark-form-field">
          <span data-i18n="thumbnail_label">Thumbnail (opsional)</span>
          <input id="bookmark-thumb-input" type="file" accept="image/*" />
        </label>
        <label class="bookmark-form-field">
          <span data-i18n="folder_label">Folder *</span>
          <select id="bookmark-folder-input" required></select>
        </label>
        <div class="bookmark-form-actions">
          <button id="bookmark-cancel-btn" type="button" class="btn-action" data-i18n="cancel_btn">Cancel</button>
          <button type="submit" class="btn-action primary" data-i18n="save_bookmark_btn">Save Bookmark</button>
        </div>
      </form>
    </div>
  </div>

  <div id="folder-modal-backdrop" class="bookmark-modal-backdrop" hidden>
    <div class="bookmark-modal" role="dialog" aria-modal="true" aria-labelledby="folder-modal-title">
      <header class="bookmark-modal-header">
        <h3 id="folder-modal-title" data-i18n="add_folder_title">Tambah Folder</h3>
        <button id="folder-modal-close" class="btn-close" type="button" aria-label="Close folder modal">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </header>
      <form id="folder-form" class="bookmark-form">
        <label class="bookmark-form-field">
          <span data-i18n="folder_title_label">Judul Folder</span>
          <input id="folder-title-input" type="text" required placeholder="Contoh: Programming" data-i18n-placeholder="folder_title_placeholder" />
        </label>
        <label class="bookmark-form-field">
          <span data-i18n="parent_folder_label">Folder Parent (opsional)</span>
          <select id="folder-parent-input"></select>
        </label>
        <div class="bookmark-form-actions">
          <button id="folder-cancel-btn" type="button" class="btn-action" data-i18n="cancel_btn">Cancel</button>
          <button type="submit" class="btn-action primary" data-i18n="save_folder_btn">Save Folder</button>
        </div>
      </form>
    </div>
  </div>

  <aside id="bookmarks-settings-sidebar" class="settings-sidebar">
    <header class="settings-header">
      <h3 data-i18n="settings_title">Settings</h3>
      <button id="bookmarks-settings-close" class="btn-close" type="button" aria-label="Close settings">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
        </svg>
      </button>
    </header>
    <div class="settings-content">
      <section class="settings-section">
        <h4 data-i18n="bookmarks_settings_heading">Bookmarks</h4>
        <div class="setting-item">
          <span data-i18n="settings_default_folder_label">Default folder untuk form</span>
          <select id="settings-default-folder"></select>
        </div>
        <div class="setting-item bookmarks-toggle-item">
          <span data-i18n="settings_open_new_tab_label">Open bookmark di tab baru</span>
          <label class="switch">
            <input type="checkbox" id="settings-open-new-tab" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-item bookmarks-toggle-item">
          <span data-i18n="settings_show_url_label">Tampilkan URL di card</span>
          <label class="switch">
            <input type="checkbox" id="settings-show-url" checked>
            <span class="slider"></span>
          </label>
        </div>
      </section>
      <section id="settings-dev-tools" class="settings-section">
        <h4 data-i18n="dev_tools_heading">Developer Tools</h4>
        <button id="settings-seed-btn" class="btn-settings" type="button" style="margin-top: 10px; color: var(--accent);">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12,2L22,8L12,14L2,8L12,2M12,22L2,16L4,14.8L12,19.6L20,14.8L22,16L12,22M12,17L4,12.2L6,11L12,14.6L18,11L20,12.2L12,17Z" />
          </svg>
          <span data-i18n="generate_dummy_btn">Generate Dummy Data</span>
        </button>
        <button id="settings-gen-thumbnails-btn" class="btn-settings" type="button" style="margin-top: 10px; color: #10b981;">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M21,19V5C21,3.89 20.1,3 19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19M8.5,13.5L11,16.5L14.5,12L19,18H5L8.5,13.5Z" />
          </svg>
          <span data-i18n="generate_all_thumbs_btn">Generate All Thumbnails</span>
        </button>
      </section>
    </div>
  </aside>

  <div id="move-to-modal-backdrop" class="bookmark-modal-backdrop" hidden>
    <div class="bookmark-modal" role="dialog" aria-modal="true" aria-labelledby="move-to-modal-title">
      <header class="bookmark-modal-header">
        <h3 id="move-to-modal-title" data-i18n="move_to_title">Move Folder</h3>
        <button id="move-to-modal-close" class="btn-close" type="button" aria-label="Close move modal">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </header>
      <form id="move-to-form" class="bookmark-form">
        <label class="bookmark-form-field">
          <span data-i18n="parent_folder_label">Folder Parent</span>
          <select id="move-to-parent-input" required></select>
        </label>
        <div class="bookmark-form-actions">
          <button id="move-to-cancel-btn" type="button" class="btn-action" data-i18n="cancel_btn">Cancel</button>
          <button type="submit" class="btn-action primary" data-i18n="move_btn">Move</button>
        </div>
      </form>
    </div>
  </div>

  <div id="rename-modal-backdrop" class="bookmark-modal-backdrop" hidden>
    <div class="bookmark-modal" role="dialog" aria-modal="true" aria-labelledby="rename-title">
      <header class="bookmark-modal-header">
        <h3 id="rename-modal-title" data-i18n="rename_title">Rename Folder</h3>
        <button id="rename-modal-close" class="btn-close" type="button" aria-label="Close rename modal">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
          </svg>
        </button>
      </header>
      <form id="rename-form" class="bookmark-form">
        <label class="bookmark-form-field">
          <span data-i18n="folder_title_label">Judul Folder</span>
          <input id="rename-folder-input" type="text" required placeholder="Contoh: Programming" data-i18n-placeholder="folder_title_placeholder" />
        </label>
        <div class="bookmark-form-actions">
          <button id="rename-cancel-btn" type="button" class="btn-action" data-i18n="cancel_btn">Cancel</button>
          <button type="submit" class="btn-action primary" data-i18n="rename_btn">Rename</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/bookmarks/main.ts"></script>
</body>

</html>
